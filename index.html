<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MELOUNovník</title>

<style>

body{
    margin:0;
    background:#f5f7f2;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

#viewport{
    width:100vw;
    height:100vh;
    overflow:auto;
}

#canvas{
    position:relative;
    width:1800px;
    height:1400px;
}

.tree-trunk{
    position:absolute;
    left:800px;
    top:500px;

    width:180px;
    height:350px;

    background:#8a5b3e;
    border-radius:12px;

    color:white;
    font-size:48px;
    font-weight:bold;

    display:none;
    align-items:center;
    justify-content:center;

    writing-mode:vertical-rl;
    text-orientation:upright;
}

.branch{
    position:absolute;
    color:#2d6f2d;
    font-weight:bold;
    font-size:34px;
    z-index:10;
}

.leaf{
    position:absolute;
    font-size:44px;
}

.melon{
    position:absolute;
    font-size:42px;
    cursor:pointer;
    z-index:20;
}

.melon:hover{
    transform:scale(1.15);
}

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,.2);
    display:none;
    max-width:350px;
    z-index:1000;
}

.close{
    margin-top:15px;
    cursor:pointer;
    color:green;
    font-weight:bold;
}

.addButton{
    position:fixed;
    bottom:20px;
    right:20px;

    background:#41a541;
    color:white;

    padding:18px 24px;
    border-radius:40px;

    text-decoration:none;
    font-weight:bold;

    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.title{
    position:fixed;
    top:10px;
    left:15px;

    font-size:32px;
    font-weight:bold;
    color:#2d6f2d;
}

</style>
</head>

<body>

<div class="title">
🍈 MELOUNovník
</div>

<div id="viewport">

<div id="canvas">
<img
src="strom.png"
style="
position:absolute;
left:500px;
top:120px;
width:800px;
z-index:1;
">

<div class="tree-trunk">
JISTOTA
</div>

<div class="branch" style="left:760px;top:180px;">
Vím, co se děje
</div>

<div class="branch" style="left:230px;top:500px;">
Někdo to řeší
</div>

<div class="branch" style="left:1180px;top:500px;">
Jde to jednoduše
</div>

<div class="branch" style="left:720px;top:1050px;">
Dotáhne se to
</div>

<div class="leaf" style="left:620px;top:170px;">🍃</div>
<div class="leaf" style="left:910px;top:170px;">🍃</div>
<div class="leaf" style="left:260px;top:420px;">🍃</div>
<div class="leaf" style="left:1280px;top:430px;">🍃</div>
<div class="leaf" style="left:800px;top:980px;">🍃</div>

<div class="melon" style="left:670px;top:250px;"
onclick="showMelon('Klient věděl, co se děje.','Michaela')">
🍈
</div>

<div class="melon" style="left:1210px;top:600px;"
onclick="showMelon('Podařilo se zjednodušit postup.','Jan')">
🍈
</div>

<div class="melon" style="left:330px;top:620px;"
onclick="showMelon('Kolega pomohl s řešením problému.','')">
🍈
</div>

</div>

</div>

<a hrefidat plod
</a>

<div class="popup" id="popup">
<div id="popupText"></div>
<div class="close" onclick="closePopup()">
Zavřít
</div>
</div>

<script>

function showMelon(text, author){

let content = text;

if(author){
content += "<br><br><b>" + author + "</b>";
}

document.getElementById("popupText").innerHTML = content;
document.getElementById("popup").style.display = "block";

}

function closePopup(){
document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
